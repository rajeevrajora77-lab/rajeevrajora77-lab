<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1" fill="#0055FF" opacity="0.18"/>
    </pattern>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#05050D"/>
      <stop offset="100%" style="stop-color:#080B1A"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0055FF;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#0055FF;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#0077FF;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0077FF;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0055FF;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#0055FF;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#0055FF;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <a xlink:href="https://rajora.live" href="https://rajora.live" target="_blank">

    <!-- Background -->
    <rect width="1200" height="280" fill="url(#bgGrad)"/>
    <rect width="1200" height="280" fill="url(#dots)"/>

    <!-- Ambient glow center -->
    <ellipse cx="600" cy="140" rx="480" ry="120" fill="url(#glowGrad)"/>

    <!-- Top accent line -->
    <rect x="0" y="0" width="1200" height="2" fill="url(#lineGrad)"/>
    <!-- Bottom accent line -->
    <rect x="0" y="278" width="1200" height="2" fill="url(#lineGrad)"/>

    <!-- Left vertical bar -->
    <rect x="48" y="40" width="3" height="200" fill="#0055FF" opacity="0.7"/>
    <!-- Right vertical bar -->
    <rect x="1149" y="40" width="3" height="200" fill="#0055FF" opacity="0.7"/>

    <!-- Corner brackets top-left -->
    <polyline points="48,40 48,28 72,28" fill="none" stroke="#0055FF" stroke-width="1.5" opacity="0.8"/>
    <!-- Corner brackets top-right -->
    <polyline points="1152,40 1152,28 1128,28" fill="none" stroke="#0055FF" stroke-width="1.5" opacity="0.8"/>
    <!-- Corner brackets bottom-left -->
    <polyline points="48,240 48,252 72,252" fill="none" stroke="#0055FF" stroke-width="1.5" opacity="0.8"/>
    <!-- Corner brackets bottom-right -->
    <polyline points="1152,240 1152,252 1128,252" fill="none" stroke="#0055FF" stroke-width="1.5" opacity="0.8"/>

    <!-- Status dot + label top-left -->
    <circle cx="72" cy="38" r="4" fill="#00DD77" filter="url(#glow)"/>
    <text x="84" y="43" font-family="'Courier New', 'Lucida Console', monospace" font-size="10" fill="#5070A0">SYSTEM ONLINE</text>

    <!-- Top-right label -->
    <text x="1128" y="43" font-family="'Courier New', 'Lucida Console', monospace" font-size="10" fill="#5070A0" text-anchor="end">BENGALURU · INDIA</text>

    <!-- Main logo text -->
    <text x="600" y="118" font-family="'Courier New', 'Lucida Console', monospace" font-size="52" font-weight="bold" fill="#FFFFFF" text-anchor="middle" letter-spacing="8" filter="url(#glow)">RAJORA AI</text>

    <!-- Blue underline accent -->
    <rect x="340" y="128" width="520" height="2" fill="url(#lineGrad)"/>

    <!-- Tagline -->
    <text x="600" y="162" font-family="'Courier New', 'Lucida Console', monospace" font-size="14" fill="#0077FF" text-anchor="middle" letter-spacing="3">AI INFRASTRUCTURE · EVERY DOMAIN · ONE STACK</text>

    <!-- Sub-tagline -->
    <text x="600" y="192" font-family="'Courier New', 'Lucida Console', monospace" font-size="11" fill="#5070A0" text-anchor="middle" letter-spacing="1">AGI Platform  ·  Interface Agents  ·  Orchestration  ·  Inference Gateway</text>

    <!-- Bottom pills -->
    <rect x="298" y="216" width="80" height="22" rx="4" fill="none" stroke="#2A3A60" stroke-width="1"/>
    <text x="338" y="231" font-family="'Courier New', 'Lucida Console', monospace" font-size="10" fill="#5070A0" text-anchor="middle">Python</text>

    <rect x="388" y="216" width="90" height="22" rx="4" fill="none" stroke="#2A3A60" stroke-width="1"/>
    <text x="433" y="231" font-family="'Courier New', 'Lucida Console', monospace" font-size="10" fill="#5070A0" text-anchor="middle">TypeScript</text>

    <rect x="488" y="216" width="80" height="22" rx="4" fill="none" stroke="#2A3A60" stroke-width="1"/>
    <text x="528" y="231" font-family="'Courier New', 'Lucida Console', monospace" font-size="10" fill="#5070A0" text-anchor="middle">FastAPI</text>

    <rect x="578" y="216" width="90" height="22" rx="4" fill="none" stroke="#0055FF" stroke-width="1" opacity="0.6"/>
    <text x="623" y="231" font-family="'Courier New', 'Lucida Console', monospace" font-size="10" fill="#0077FF" text-anchor="middle">LangGraph</text>

    <rect x="678" y="216" width="72" height="22" rx="4" fill="none" stroke="#2A3A60" stroke-width="1"/>
    <text x="714" y="231" font-family="'Courier New', 'Lucida Console', monospace" font-size="10" fill="#5070A0" text-anchor="middle">Claude</text>

    <rect x="760" y="216" width="70" height="22" rx="4" fill="none" stroke="#2A3A60" stroke-width="1"/>
    <text x="795" y="231" font-family="'Courier New', 'Lucida Console', monospace" font-size="10" fill="#5070A0" text-anchor="middle">Redis</text>

    <rect x="840" y="216" width="64" height="22" rx="4" fill="none" stroke="#2A3A60" stroke-width="1"/>
    <text x="872" y="231" font-family="'Courier New', 'Lucida Console', monospace" font-size="10" fill="#5070A0" text-anchor="middle">AWS</text>

    <!-- Bottom domain -->
    <text x="600" y="262" font-family="'Courier New', 'Lucida Console', monospace" font-size="11" fill="#2A3A60" text-anchor="middle">rajora.live</text>

  </a>
</svg>